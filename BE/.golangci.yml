version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

formatters:
  enable:
    - gofmt

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
