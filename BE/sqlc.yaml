version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "internal/recipe/queries"
      - "internal/suggestion/queries"
      - "internal/user/queries"
      - "internal/nutrition/queries"
      - "internal/engagement/queries"
    schema: "migrations"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        json_tags_case_style: "camel"
